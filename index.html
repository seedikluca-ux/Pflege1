<body>
<div id="app" class="app"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const VERSION = "v9.0";
if(localStorage.getItem("pf_ver") !== VERSION){
  localStorage.removeItem("pf_u");
  localStorage.removeItem("pf_s");
  localStorage.removeItem("pf_n");
  localStorage.setItem("pf_ver", VERSION);
}

function ago6(){ const d=new Date(); d.setMonth(d.getMonth()-6); return d.toISOString(); }
function calcPause(s,e){ const h=(new Date(e)-new Date(s))/3600000; if(h>=9) return 45*60000; if(h>=6) return 30*60000; return 0; }
function fTime(d){ return new Date(d).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
function fDate(d){ return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}); }
function fDateL(d){ return new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"}); }
function fDur(ms){ if(!ms||ms<=0) return "—"; const m=Math.floor(ms/60000),h=Math.floor(m/60); return h+"h "+(m%60).toString().padStart(2,"0")+"min"; }
function fH(ms){ return ms>0?(ms/3600000).toFixed(2):"0.00"; }
function fullN(u){ return ((u.vorname||"")+" "+(u.nachname||"")).trim()||u.email; }
function initials(u){ const n=fullN(u); const p=n.split(" "); return ((p[0]||"")[0]||"")+((p[1]||"")[0]||""); }
function toLocal(iso){ const d=new Date(iso); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }
function ld(k,f){ try{ return JSON.parse(localStorage.getItem(k))||f; }catch{ return f; } }
function sv(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function isAdmin(u){ return u && ["PDL","Admin"].includes(u.role); }
function expired(u){ return (new Date()-new Date(u.lastChanged))/(1000*60*60*24*30)>=6; }

function checkPw(pw){
  const e=[];
  if(pw.length<8) e.push("Mindestens 8 Zeichen");
  if(!/[A-Z]/.test(pw)) e.push("Mindestens 1 Großbuchstabe");
  if(!/[a-z]/.test(pw)) e.push("Mindestens 1 Kleinbuchstabe");
  if(!/[0-9]/.test(pw)) e.push("Mindestens 1 Zahl");
  if(!/[!@#$%^&*()\-_+=[\]{}|;:,.<>?]/.test(pw)) e.push("Mindestens 1 Sonderzeichen");
  return e;
}
function pwScore(pw){
  let s=0;
  if(pw.length>=8)s++; if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw))s++; if(/[0-9]/.test(pw))s++;
  if(/[!@#$%^&*()\-_+=[\]{}|;:,.<>?]/.test(pw))s++;
  if(s<=2) return {label:"Schwach",color:"#ef4444",w:"33%"};
  if(s<=3) return {label:"Mittel",color:"#f59e0b",w:"66%"};
  return {label:"Stark",color:"#10b981",w:"100%"};
}

// ── INIT DATA ──────────────────────────────────────────────────────────────
function buildLucaSessions(){
  const s=[];
  for(let d=1;d<=30;d++){
    const dt=new Date(2026,3,d); const dow=dt.getDay();
    if(dow===0||dow===6) continue;
    s.push({id:2000+d,userId:2,userName:"Luca",role:"Examinierter Altenpfleger",
      start:new Date(2026,3,d,6,0,0).toISOString(),end:new Date(2026,3,d,14,0,0).toISOString(),
      note:"",tor:"Tor 1",pause:30*60000,editedBy:null});
  }
  return s;
}
function buildSebastianSessions(){
  const s=[];
  for(let d=1;d<=30;d++){
    const dt=new Date(2026,3,d); const dow=dt.getDay();
    if(dow===0||dow===5||dow===6) continue;
    s.push({id:3000+d,userId:3,userName:"Sebastian",role:"Examinierter Krankenpfleger",
      start:new Date(2026,3,d,6,0,0).toISOString(),end:new Date(2026,3,d,14,0,0).toISOString(),
      note:"",tor:"Tor 3",pause:30*60000,editedBy:null});
  }
  return s;
}

const INIT_USERS=[
  {id:1,vorname:"PDL",nachname:"",email:"pdl@pdl.de",role:"PDL",password:"Pdl2026!",mustChange:false,lastChanged:new Date().toISOString(),avatar:"PD",resetCode:null,geburtsdatum:"",telefon:"",photo:null,dsgvoAccepted:true,dsgvoDate:new Date().toISOString()},
  {id:2,vorname:"Luca",nachname:"",email:"luca@luca.de",role:"Examinierter Altenpfleger",password:"Luca2026!",mustChange:false,lastChanged:new Date().toISOString(),avatar:"LU",resetCode:null,geburtsdatum:"",telefon:"",photo:null,dsgvoAccepted:true,dsgvoDate:new Date(2026,3,1).toISOString()},
  {id:3,vorname:"Sebastian",nachname:"",email:"sebastian@pflege.de",role:"Examinierter Krankenpfleger",password:"Start@2024",mustChange:false,lastChanged:new Date().toISOString(),avatar:"SE",resetCode:null,geburtsdatum:"",telefon:"",photo:null,dsgvoAccepted:true,dsgvoDate:new Date(2026,3,1).toISOString()}
];
const INIT_SESSIONS=[...buildLucaSessions(),...buildSebastianSessions()];
const INIT_NOTES=[{id:9001,userId:2,userName:"Luca",role:"Examinierter Altenpfleger",text:"Hallo",createdAt:new Date(2026,3,1,8,15,0).toISOString(),readBy:[3]}];

// ── APP STATE ──────────────────────────────────────────────────────────────
let STATE = {
  users: ld("pf_u", INIT_USERS),
  sessions: ld("pf_s", INIT_SESSIONS),
  notes: ld("pf_n", INIT_NOTES),
  screen: "login",
  me: null,
  active: null,
  aTab: "today",
  sTab: "clock",
  uFilter: "all",
  showTor: false,
  showExp: false,
  showAdd: false,
  editSess: null,
  editProf: null,
  showDsgvo: false,
  // form fields
  lEmail:"", lPw:"", lErr:"", showLPw:false,
  nPw:"", cPw:"", pwErr:[], showNPw:false,
  rEmail:"", rCode:"", rNPw:"", rMsg:"", rGen:"",
  cNote:"", nText:"", nSaved:false, addMsg:"",
  tick: new Date()
};

function saveState(){
  sv("pf_u", STATE.users);
  sv("pf_s", STATE.sessions);
  sv("pf_n", STATE.notes);
}

function setState(updates){
  Object.assign(STATE, updates);
  saveState();
  render();
}

// ── TIMER ──────────────────────────────────────────────────────────────────
setInterval(()=>{ STATE.tick=new Date(); render(); }, 1000);

// ── LOGIC ──────────────────────────────────────────────────────────────────
function doLogin(){
  const u=STATE.users.find(u=>u.email.toLowerCase()===STATE.lEmail.trim().toLowerCase()&&u.password===STATE.lPw);
  if(!u){ setState({lErr:"E-Mail oder Passwort falsch."}); return; }
  STATE.lEmail=""; STATE.lPw=""; STATE.lErr=""; STATE.me=u;
  if(!u.dsgvoAccepted){ setState({screen:"dsgvo"}); return; }
  if(u.mustChange||expired(u)){ setState({screen:"changePw"}); return; }
  setState({screen:isAdmin(u)?"admin":"dash"});
}

function doDsgvoAccept(){
  const upd=STATE.users.map(u=>u.id===STATE.me.id?{...u,dsgvoAccepted:true,dsgvoDate:new Date().toISOString()}:u);
  STATE.users=upd; STATE.me=upd.find(u=>u.id===STATE.me.id);
  if(STATE.me.mustChange||expired(STATE.me)){ setState({screen:"changePw"}); return; }
  setState({screen:isAdmin(STATE.me)?"admin":"dash"});
}

function doChangePw(){
  const errs=checkPw(STATE.nPw);
  if(errs.length){ setState({pwErr:errs}); return; }
  if(STATE.nPw!==STATE.cPw){ setState({pwErr:["Passwörter stimmen nicht überein"]}); return; }
  if(STATE.nPw===STATE.me.password){ setState({pwErr:["Nicht dasselbe Passwort verwenden"]}); return; }
  const upd=STATE.users.map(u=>u.id===STATE.me.id?{...u,password:STATE.nPw,mustChange:false,lastChanged:new Date().toISOString()}:u);
  STATE.users=upd; STATE.me=upd.find(u=>u.id===STATE.me.id);
  STATE.nPw=""; STATE.cPw=""; STATE.pwErr=[];
  setState({screen:isAdmin(STATE.me)?"admin":"dash"});
}

function doResetReq(){
  const u=STATE.users.find(u=>u.email.toLowerCase()===STATE.rEmail.trim().toLowerCase());
  if(!u){ setState({rMsg:"❌ E-Mail nicht gefunden."}); return; }
  const code=Math.floor(100000+Math.random()*900000).toString();
  STATE.users=STATE.users.map(x=>x.id===u.id?{...x,resetCode:code}:x);
  setState({rGen:code,rMsg:"✅ Demo-Code: "+code});
}

function doResetSave(){
  const u=STATE.users.find(u=>u.email.toLowerCase()===STATE.rEmail.trim().toLowerCase());
  if(!u||u.resetCode!==STATE.rCode){ setState({rMsg:"❌ Code falsch."}); return; }
  const errs=checkPw(STATE.rNPw);
  if(errs.length){ setState({rMsg:"❌ "+errs[0]}); return; }
  STATE.users=STATE.users.map(x=>x.id===u.id?{...x,password:STATE.rNPw,resetCode:null,mustChange:false,lastChanged:new Date().toISOString()}:x);
  setState({rMsg:"✅ Passwort geändert! Bitte einloggen."});
  setTimeout(()=>setState({screen:"login",rMsg:"",rEmail:"",rCode:"",rNPw:"",rGen:""}),2500);
}

function pickTor(tor){
  const s={id:Date.now(),userId:STATE.me.id,userName:fullN(STATE.me),role:STATE.me.role,
    start:new Date().toISOString(),end:null,note:"",tor:"Tor "+tor,pause:null,editedBy:null};
  STATE.sessions=[...STATE.sessions,s]; STATE.active=s;
  setState({showTor:false});
}

function doClockOut(){
  const end=new Date().toISOString();
  const p=calcPause(STATE.active.start,end);
  STATE.sessions=STATE.sessions.map(s=>s.id===STATE.active.id?{...s,end,note:STATE.cNote,pause:p}:s);
  STATE.active=null;
  setState({cNote:""});
}

function doSaveNote(){
  if(!STATE.nText.trim()) return;
  const n={id:Date.now(),userId:STATE.me.id,userName:fullN(STATE.me),role:STATE.me.role,text:STATE.nText.trim(),createdAt:new Date().toISOString(),readBy:[]};
  STATE.notes=[...STATE.notes,n];
  setState({nText:"",nSaved:true});
  setTimeout(()=>setState({nSaved:false}),2000);
}

function doAddUser(data){
  if(STATE.users.find(u=>u.email===data.email)) return;
  const u={id:Date.now(),vorname:data.vorname,nachname:data.nachname,email:data.email,
    role:data.role,password:data.password,mustChange:true,lastChanged:ago6(),
    avatar:(data.vorname?.[0]||"")+(data.nachname?.[0]||"P"),
    resetCode:null,geburtsdatum:"",telefon:"",photo:null,dsgvoAccepted:false,dsgvoDate:null};
  STATE.users=[...STATE.users,u];
  setState({showAdd:false,addMsg:"✅ "+fullN(u)+" angelegt! Login: "+u.email});
  setTimeout(()=>setState({addMsg:""}),4000);
}

function doSaveSession(id,eStart,eEnd,ePause){
  STATE.sessions=STATE.sessions.map(s=>s.id===id?{...s,
    start:new Date(eStart).toISOString(),
    end:eEnd?new Date(eEnd).toISOString():null,
    pause:ePause*60000,editedBy:fullN(STATE.me),editedAt:new Date().toISOString()}:s);
  setState({editSess:null});
}

function doSaveProfile(id,data){
  STATE.users=STATE.users.map(u=>u.id===id?{...u,...data}:u);
  if(STATE.me?.id===id) STATE.me={...STATE.me,...data};
  setState({editProf:null});
}

function doLogout(){ STATE.me=null; STATE.active=null; setState({screen:"login"}); }

// ── EXPORT ─────────────────────────────────────────────────────────────────
function buildHTML(uid){
  const list=(uid?STATE.sessions.filter(s=>s.userId===uid&&s.end):STATE.sessions.filter(s=>s.end)).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const name=uid?fullN(STATE.users.find(u=>u.id===uid)||{vorname:"?",nachname:""}):"Alle Mitarbeiter";
  const rows=list.map(s=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);const n=d-p;
    return `<tr><td>${s.userName}</td><td>${fDate(s.start)}</td><td>${fTime(s.start)}</td><td>${fTime(s.end)}</td><td>${fDur(p)}</td><td style="font-weight:bold;color:#1a56db">${fDur(n)}</td><td>${fH(n)}</td><td>${s.tor||"—"}</td><td>${s.note||""}</td></tr>`;
  }).join("");
  const tot=list.reduce((a,s)=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Zeitnachweis</title>
<style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{color:#1a56db}
table{width:100%;border-collapse:collapse}th{background:#1a56db;color:#fff;padding:7px;text-align:left;font-size:10px}
td{padding:6px 8px;border-bottom:1px solid #e5e7eb}tr:nth-child(even)td{background:#f9fafb}
.tot{margin-top:12px;font-weight:bold;color:#1a56db;font-size:14px}
.sig{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px}
.sig div{border-top:1px solid #333;padding-top:6px;font-size:10px;color:#666}
.pbtn{background:#1a56db;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:20px}
</style></head><body>
<button class="pbtn" onclick="window.print()">🖨️ Drucken / Als PDF speichern</button>
<h1>🏥 Ambulante Pflege — Zeitnachweis</h1>
<p style="color:#666;font-size:10px;margin:8px 0 16px">${name} · Erstellt: ${fDate(new Date())} · ${list.length} Einträge</p>
<table><thead><tr><th>Name</th><th>Datum</th><th>Von</th><th>Bis</th><th>Pause</th><th>Netto</th><th>Std.</th><th>Tor</th><th>Notiz</th></tr></thead>
<tbody>${rows}</tbody></table>
<p class="tot">Gesamt Netto: ${fDur(tot)} = ${fH(tot)} Stunden</p>
<div class="sig"><div>Unterschrift Mitarbeiter/in<br><br>${name}</div><div>Unterschrift PDL<br><br>&nbsp;</div></div>
</body></html>`;
}

function doPDF(uid){ const w=window.open("","_blank"); if(w){w.document.write(buildHTML(uid));w.document.close();} }

function doCSV(uid){
  const list=(uid?STATE.sessions.filter(s=>s.userId===uid&&s.end):STATE.sessions.filter(s=>s.end)).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const name=uid?fullN(STATE.users.find(u=>u.id===uid)||{vorname:"?",nachname:""}):"Alle";
  const rows=list.map(s=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);const n=d-p;
    return [s.userName,fDate(s.start),fTime(s.start),fTime(s.end),fDur(p),fDur(n),fH(n),s.tor||"—",s.note||""].join(";");
  }).join("\n");
  const tot=list.reduce((a,s)=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
  const csv="\uFEFFName;Datum;Von;Bis;Pause;Netto;Stunden;Tor;Notiz\n"+rows+"\n\nGesamt;;;;;;"+fH(tot)+";;";
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=("Zeitnachweis_"+name).replace(/[^a-z0-9]/gi,"_")+".csv";
  a.click();
}

// ── HTML HELPERS ───────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class") el.className=v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false||c===undefined) continue;
    if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(c));
    else if(c instanceof Node) el.appendChild(c);
    else if(Array.isArray(c)) c.forEach(x=>x instanceof Node&&el.appendChild(x));
  }
  return el;
}

function div(cls,...children){ return h("div",{class:cls},...children); }
function btn(cls,txt,onclick){ return h("button",{class:"btn "+cls,onclick},txt); }
function inp(cls,attrs){ return h("input",{class:"inp "+cls,...attrs}); }
function lbl(txt){ return h("span",{class:"lbl"},txt); }

    mbx.appendChild(h("p",{class:"lbl",style:{marginTop:"14px"}},"Exportieren als"));
    mbx.appendChild(div("exp-grid",
      h("div",{class:"exp-btn",onclick:()=>doPDF(selUid==="all"?null:parseInt(selUid))},
        h("span",{class:"ei"},"📄"),h("p",{class:"el"},"PDF"),h("p",{class:"es"},"Drucken")),
      h("div",{class:"exp-btn",onclick:()=>doCSV(selUid==="all"?null:parseInt(selUid))},
        h("span",{class:"ei"},"📊"),h("p",{class:"el"},"Excel"),h("p",{class:"es"},"CSV")),
      h("div",{class:"exp-btn",onclick:()=>{
        const uid2=selUid==="all"?null:parseInt(selUid);
        const list2=(uid2?STATE.sessions.filter(s=>s.userId===uid2&&s.end):STATE.sessions.filter(s=>s.end));
        const name2=uid2?fullN(STATE.users.find(u=>u.id===uid2)||{vorname:"?",nachname:""}):"Alle";
        const tot2=list2.reduce((a,s)=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
        const body=encodeURIComponent("Zeitnachweis "+name2+"\nEinträge: "+list2.length+"\nGesamt: "+fDur(tot2)+" ("+fH(tot2)+" Std.)");
        const sub=encodeURIComponent("Zeitnachweis "+name2+" "+fDate(new Date()));
        const to=email?encodeURIComponent(email):"";
        window.open("mailto:"+to+"?subject="+sub+"&body="+body);
      }},h("span",{class:"ei"},"✉️"),h("p",{class:"el"},"E-Mail"),h("p",{class:"es"},"Versenden"))
    ));
    
    mbx.appendChild(btn("btn-gh","Schließen",()=>setState({showExp:false})));
    container.appendChild(mbx);
  }
  
  buildModal();
  return container;
}

// ── ADMIN SCREEN ───────────────────────────────────────────────────────────
function renderAdmin(){
  const tick=STATE.tick;
  const todayStr=tick.toDateString();
  const filt=STATE.uFilter==="all"?STATE.sessions:STATE.sessions.filter(s=>s.userId===parseInt(STATE.uFilter));
  const adminSess=filt.filter(s=>s.end).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const adminToday=[...filt].filter(s=>new Date(s.start).toDateString()===todayStr).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const aktiveSess=STATE.sessions.filter(s=>!s.end&&new Date(s.start).toDateString()===todayStr);
  const todayNet2=adminToday.reduce((a,s)=>{if(!s.end)return a;const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
  const allNet=adminSess.reduce((a,s)=>{const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
  
  const filterBar=div("",h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
    h("select",{class:"sel",style:{width:"auto",fontSize:"11px",padding:"5px 9px"},onchange:e=>setState({uFilter:e.target.value})},
      h("option",{value:"all"},"Alle Mitarbeiter"),
      ...STATE.users.filter(u=>!isAdmin(u)).map(u=>{const o=h("option",{value:u.id},fullN(u));if(String(u.id)===String(STATE.uFilter))o.selected=true;return o;})
    ),
    h("button",{class:"sm sm-g",onclick:()=>setState({showExp:true})},"📤 Zeitnachweis")
  ));
  
  // HEUTE TAB
  const todayContent=div("");
  if(aktiveSess.length>0){
    const aktDiv=div("",h("div",{style:{background:"#052e16",border:"1px solid #166534",borderRadius:"10px",padding:"10px 13px",marginBottom:"10px"}},
      h("p",{style:{fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",color:"#4ade80",marginBottom:"6px"}},"🟢 Gerade aktiv"),
      ...aktiveSess.map(s=>h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
        h("span",{style:{fontWeight:"800",fontSize:"13px",color:"#fff"}},s.userName+" ",h("span",{style:{color:"#64748b",fontWeight:"400"}},s.tor||"")),
        h("span",{style:{fontFamily:"monospace",fontSize:"12px",color:"#4ade80"}},
          "seit "+fTime(s.start)+" · "+fDur(tick-new Date(s.start)))
      ))
    ));
    todayContent.appendChild(filterBar);
    todayContent.appendChild(aktDiv);
  } else {
    todayContent.appendChild(filterBar);
  }
  
  const todayTbl=div("tw",h("table",{class:"tbl"},
    h("thead",{},h("tr",{},...["Name","Datum","Von","Bis","Pause","Netto","Tor",""].map(t=>h("th",{},t)))),
    h("tbody",{},...(adminToday.length===0?[h("tr",{},h("td",{colspan:"8",style:{textAlign:"center",color:"#475569",padding:"16px"}},"Noch keine Einträge heute"))]:
      adminToday.map(s=>{
        const dur=s.end?new Date(s.end)-new Date(s.start):tick-new Date(s.start);
        const p=s.end?(s.pause!=null?s.pause:calcPause(s.start,s.end)):0;
        const net=s.end?dur-p:dur;
        return h("tr",{},
          h("td",{},h("span",{style:{fontWeight:"700",color:"#e2e8f0"}},s.userName),s.editedBy?h("span",{class:"wt"},"✏️"):null),
          h("td",{class:"mn"},fDate(s.start)),
          h("td",{class:"mn cb"},fTime(s.start)),
          h("td",{class:"mn cb"},s.end?fTime(s.end):h("span",{style:{color:"#4ade80",fontWeight:"800"}},"aktiv ▶")),
          h("td",{class:"mn cm"},s.end?fDur(p):"—"),
          h("td",{class:"mn cg"},fDur(net)),
          h("td",{class:"cm"},s.tor||"—"),
          h("td",{},h("button",{class:"sm",onclick:()=>setState({editSess:s})},"✏️"))
        );
      })
    ))
  ));
  if(todayNet2>0) todayTbl.appendChild(div("tft",h("label",{},"Heute Netto"),h("span",{},fDur(todayNet2))));
  todayContent.appendChild(todayTbl);
  
  // ZEITEN TAB
  const allContent=div("");
  allContent.appendChild(filterBar.cloneNode(true));
  allContent.querySelector("select").onchange=e=>setState({uFilter:e.target.value});
  allContent.querySelector(".sm-g").onclick=()=>setState({showExp:true});
  const allTbl=div("tw",h("table",{class:"tbl"},
    h("thead",{},h("tr",{},...["Name","Datum","Von","Bis","Pause","Netto","Tor",""].map(t=>h("th",{},t)))),
    h("tbody",{},...(adminSess.length===0?[h("tr",{},h("td",{colspan:"8",style:{textAlign:"center",color:"#475569",padding:"16px"}},"Keine Einträge"))]:
      adminSess.slice(0,50).map(s=>{
        const dur=new Date(s.end)-new Date(s.start);
        const p=s.pause!=null?s.pause:calcPause(s.start,s.end);
        const net=dur-p;
        return h("tr",{},
          h("td",{},h("span",{style:{fontWeight:"700",color:"#e2e8f0"}},s.userName),s.editedBy?h("span",{class:"wt"},"✏️"):null),
          h("td",{class:"mn"},fDate(s.start)),
          h("td",{class:"mn cb"},fTime(s.start)),
          h("td",{class:"mn cb"},fTime(s.end)),
          h("td",{class:"mn cm"},fDur(p)),
          h("td",{class:"mn cg"},fDur(net)),
          h("td",{class:"cm"},s.tor||"—"),
          h("td",{},h("button",{class:"sm",onclick:()=>setState({editSess:s})},"✏️"))
        );
      })
    ))
  ));
  if(allNet>0) allTbl.appendChild(div("tft",h("label",{},"Gesamt Netto"),h("span",{},fDur(allNet)+" = "+fH(allNet)+" Std.")));
  allContent.appendChild(allTbl);
  
  // NOTIZEN TAB
  const notesContent=div("",div("scrl",...([...STATE.notes].reverse().map(n=>{
    const alleAdmins=STATE.users.filter(u=>isAdmin(u));
    const alleGelesen=alleAdmins.every(a=>(n.readBy||[]).includes(a.id));
    const gelesenVon=STATE.users.filter(u=>(n.readBy||[]).includes(u.id)&&u.id!==n.userId);
    const nochNicht=STATE.users.filter(u=>!(n.readBy||[]).includes(u.id)&&u.id!==n.userId);
    const nc=div("nc");
    nc.appendChild(h("p",{style:{fontSize:"15px",fontWeight:"800",color:"#fff",lineHeight:"1.5",marginBottom:"8px"}},n.text));
    nc.appendChild(div("",h("span",{style:{fontSize:"11px",color:"#60a5fa",fontWeight:"700"}},"✍️ "+n.userName+" "),
      h("span",{style:{fontSize:"10px",color:"#64748b"}},n.role+" · "+fDate(n.createdAt)+" "+fTime(n.createdAt))));
    const readBox=h("div",{style:{background:"#0f172a",borderRadius:"7px",padding:"8px 10px",margin:"8px 0"}},
      h("p",{style:{fontSize:"10px",color:"#475569",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"5px"}},"Gelesen von"),
      gelesenVon.length===0
        ?h("p",{style:{fontSize:"12px",color:"#f59e0b"}},"● Noch niemand")
        :h("div",{},...gelesenVon.map(u=>h("p",{style:{fontSize:"12px",color:"#4ade80",fontWeight:"700",marginBottom:"2px"}},"✓✓ "+fullN(u)+" ",h("span",{style:{color:"#64748b",fontWeight:"400"}},"("+u.role+")")))),
      nochNicht.length>0?h("div",{style:{marginTop:"5px",borderTop:"1px solid #1e2a42",paddingTop:"5px"}},
        ...nochNicht.map(u=>h("p",{style:{fontSize:"11px",color:"#64748b",marginBottom:"1px"}},"○ "+fullN(u)+" — noch nicht gelesen")))
        :null
    );
    nc.appendChild(readBox);
    if(!(n.readBy||[]).includes(STATE.me.id)){
      nc.appendChild(btn("btn-g","✅ Als gelesen markieren",()=>{
        STATE.notes=STATE.notes.map(x=>x.id===n.id?{...x,readBy:[...new Set([...(x.readBy||[]),STATE.me.id])]}:x);
        setState({});
      }));
    }
    return nc;
  }))));
  
  // PROFILE TAB
  const profContent=div("");
  profContent.appendChild(btn("btn-g","➕ Neuen Mitarbeiter anlegen",()=>setState({showAdd:true})));
  if(STATE.addMsg) profContent.appendChild(div("as",h("p",{},STATE.addMsg)));
  const profList=div("scrl");
  STATE.users.filter(u=>!isAdmin(u)).forEach(u=>{
    const row=div("user-card");
    const avEl=div("av",u.photo?h("img",{src:u.photo,alt:""}):"");
    if(!u.photo) avEl.textContent=initials(u);
    const info=div("",h("p",{style:{fontWeight:"800",fontSize:"14px",color:"#e2e8f0"}},fullN(u)),
      h("p",{style:{fontSize:"11px",color:"#64748b"}},u.role+" · "+u.email),
      div("pg",
        div("pi",h("p",{class:"pk"},"Passwort"),h("p",{class:"pv",style:{fontSize:"10px",color:u.mustChange?"#fbbf24":expired(u)?"#f87171":"#4ade80"}},u.mustChange?"⚠️ Ändern nötig":expired(u)?"⏰ Abgelaufen":"✓ OK")),
        div("pi",h("p",{class:"pk"},"DSGVO"),h("p",{class:"pv",style:{fontSize:"10px",color:u.dsgvoAccepted?"#4ade80":"#f87171"}},u.dsgvoAccepted?"✓ "+fDate(u.dsgvoDate):"⚠️ Noch nicht"))
      )
    );
    const btns=div("",{style:{display:"flex",flexDirection:"column",gap:"5px",flexShrink:"0"}},
      h("button",{class:"sm",onclick:()=>setState({editProf:u})},"✏️"),
      h("button",{class:"sm sm-r",onclick:()=>{STATE.users=STATE.users.map(x=>x.id===u.id?{...x,password:"Start@2024",mustChange:true}:x);setState({});}}, "🔑")
    );
    row.appendChild(avEl); row.appendChild(info); row.appendChild(btns);
    profList.appendChild(row);
  });
  profContent.appendChild(profList);
  
  // TABS
  const tabs=["today","all","notes","prof"];
  const tabLabels=["📅 Heute","📋 Zeiten","📝 Notizen","👥 Mitarbeiter"];
  const contents=[todayContent,allContent,notesContent,profContent];
  
  const tabBar=div("tabs",...tabs.map((t,i)=>h("button",{class:"tab"+(STATE.aTab===t?" on":""),onclick:()=>setState({aTab:t})},tabLabels[i])));
  
  return card("📊 "+STATE.me.role+" — Übersicht",fDateL(tick)+" · "+tick.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
    tabBar,
    contents[tabs.indexOf(STATE.aTab)],
    btn("btn-gh","← Ausloggen",doLogout)
  );
}

// ── DASH SCREEN ────────────────────────────────────────────────────────────
function renderDash(){
  const me=STATE.me;
  const tick=STATE.tick;
  const todayStr=tick.toDateString();
  const mySess=STATE.sessions.filter(s=>s.userId===me.id);
  const todaySess=mySess.filter(s=>new Date(s.start).toDateString()===todayStr).sort((a,b)=>new Date(a.start)-new Date(b.start));
  const todayNet=todaySess.reduce((a,s)=>{if(!s.end)return a;const d=new Date(s.end)-new Date(s.start);const p=s.pause!=null?s.pause:calcPause(s.start,s.end);return a+(d-p);},0);
  const elapsed=STATE.active?tick-new Date(STATE.active.start):0;
  
  // Header mit User info
  const avEl=div("av");
  if(me.photo) avEl.appendChild(h("img",{src:me.photo,alt:""}));
  else avEl.textContent=initials(me);
  
  const uh=div("uh",
    Object.assign(avEl,{style:{width:"42px",height:"42px"}}),
    div("",h("p",{style:{fontWeight:"800",fontSize:"15px",color:"#e2e8f0"}},fullN(me)),
      h("p",{style:{fontSize:"11px",color:"#64748b"}},me.role)),
    div("",h("span",{class:"bdg "+(STATE.active?"bi":"bo")},h("span",{class:"dot"}),STATE.active?"Aktiv":"Frei"),
      STATE.active?.tor?h("br"):null,
      STATE.active?.tor?h("span",{class:"tor-chip",style:{marginTop:"4px"}},"🚪 "+STATE.active.tor):null
    )
  );
  
  const tabs=["clock","notes","history"];
  const tabLabels=["⏱ Stempeln","📝 Notizen","📋 Verlauf"];
  const tabBar=div("tabs",...tabs.map((t,i)=>h("button",{class:"tab"+(STATE.sTab===t?" on":""),onclick:()=>setState({sTab:t})},tabLabels[i])));
  
  let content;
  
  if(STATE.sTab==="clock"){
    const clockEl=h("div",{class:"clk"},tick.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    const els=[clockEl];
    if(STATE.active) els.push(div("elp",h("small",{},"Schicht läuft seit"),fDur(elapsed)));
    if(!STATE.active){
      els.push(btn("btn-o","🚪 Tor wählen & Einstempeln",()=>setState({showTor:true})));
    } else {
      const ta=h("textarea",{class:"inp",style:{resize:"none",marginTop:"10px",minHeight:"56px"},placeholder:"Notiz zur Schicht (optional)..."},STATE.cNote);
      ta.oninput=e=>STATE.cNote=e.target.value;
      els.push(ta);
      els.push(btn("btn-r","⏹ Ausstempeln",doClockOut));
    }
    if(todayNet>0) els.push(div("tot-row",h("span",{style:{fontWeight:"700",color:"#4ade80",fontSize:"13px"}},"Heute Netto"),h("span",{style:{fontFamily:"monospace",color:"#4ade80",fontWeight:"700"}},fDur(todayNet))));
    els.push(btn("btn-gh","📤 Zeitnachweis exportieren",()=>setState({showExp:true})));
    content=div("",...els);
  }
  
  else if(STATE.sTab==="notes"){
    const ta=h("textarea",{class:"inp",style:{resize:"none",minHeight:"80px"},placeholder:"Notiz eingeben..."},STATE.nText);
    ta.oninput=e=>STATE.nText=e.target.value;
    const els=[
      h("p",{style:{fontSize:"12px",color:"#64748b",marginBottom:"8px"}},"Notizen sind für alle Mitarbeiter sichtbar."),
      ta,
      btn("btn-p","💾 Notiz speichern",doSaveNote)
    ];
    if(STATE.nSaved) els.push(div("as",h("p",{},"✅ Gespeichert!")));
    els.push(div("div"));
    els.push(h("p",{style:{fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",color:"#475569",marginBottom:"8px"}},"Alle Notizen ("+STATE.notes.length+")"));
    const scrl=div("scrl");
    if(STATE.notes.length===0) scrl.appendChild(h("p",{style:{color:"#475569",fontSize:"12px",textAlign:"center",padding:"12px 0"}},"Noch keine Notizen"));
    [...STATE.notes].reverse().forEach(n=>{
      const eigenNotiz=n.userId===me.id;
      const gelesen=(n.readBy||[]).includes(me.id);
      const nc=div("nc",{style:{opacity:gelesen&&!eigenNotiz?"0.6":"1"}});
      nc.appendChild(h("p",{class:"nt"},n.text));
      nc.appendChild(div("nm",
        h("span",{},h("span",{class:"na",style:{color:eigenNotiz?"#4ade80":"#60a5fa"}},eigenNotiz?"Ich":n.userName)),
        h("span",{style:{color:"#64748b"}},n.role),
        h("span",{},"📅 "+fDate(n.createdAt)),
        h("span",{},"🕐 "+fTime(n.createdAt)+" Uhr")
      ));
      scrl.appendChild(nc);
    });
    els.push(scrl);
    content=div("",...els);
  }
  
  else {
    const exportBtn=h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}},
      h("button",{class:"sm sm-g",onclick:()=>setState({showExp:true})},"📤 Exportieren")
    );
    const tbl=div("tw",h("table",{class:"tbl"},
      h("thead",{},h("tr",{},...["Datum","Von","Bis","Pause","Netto","Tor"].map(t=>h("th",{},t)))),
      h("tbody",{},...(todaySess.length===0?[h("tr",{},h("td",{colspan:"6",style:{textAlign:"center",color:"#475569",padding:"14px"}},"Keine Einträge heute"))]:
        todaySess.map(s=>{
          const dur=s.end?new Date(s.end)-new Date(s.start):0;
          const p=s.end?(s.pause!=null?s.pause:calcPause(s.start,s.end)):0;
          const net=s.end?dur-p:0;
          return h("tr",{},
            h("td",{class:"mn"},fDate(s.start)),
            h("td",{class:"mn cb"},fTime(s.start)),
            h("td",{class:"mn cb"},s.end?fTime(s.end):h("span",{style:{color:"#f59e0b"}},"läuft")),
            h("td",{class:"mn cm"},s.end?fDur(p):"—"),
            h("td",{class:"mn cg"},s.end?fDur(net):"—"),
            h("td",{class:"cm"},s.tor||"—")
          );
        })
      ))
    ));
    if(todayNet>0) tbl.appendChild(div("tft",h("label",{},"Heute Netto"),h("span",{},fDur(todayNet))));
    content=div("",exportBtn,tbl);
  }
  
  // Export modal für Mitarbeiter (fixedUid)
  if(STATE.showExp){
    document.body.appendChild(renderExportModal(me.id));
  }
  
  const footer=div("btn2",
    btn("btn-gh","🔐 Passwort",()=>setState({screen:"changePw"})),
    btn("btn-gh","← Logout",doLogout)
  );
  footer.style.marginTop="12px";
  
  return card("🏥 Zeiterfassung",fDateL(tick),uh,tabBar,content,footer);
}

// Start
render();
</script>
</body>
</html>
